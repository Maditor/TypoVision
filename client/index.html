<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>TypoVision</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">

    <!-- Top bar -->
    <div class="top-bar">
      <div class="status-row">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Checking…</span>
      </div>
      <button type="button" id="settingsBtn" class="icon-btn" title="Settings" aria-expanded="false">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 10a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z" stroke="currentColor" stroke-width="1.4"/>
          <path d="M13.3 9.4a1 1 0 0 0 .2 1.1l.1.1a1.2 1.2 0 0 1-1.7 1.7l-.1-.1a1 1 0 0 0-1.1-.2 1 1 0 0 0-.6.9V13a1.2 1.2 0 0 1-2.4 0v-.1a1 1 0 0 0-.65-.91 1 1 0 0 0-1.1.2l-.07.07a1.2 1.2 0 1 1-1.7-1.7l.07-.07A1 1 0 0 0 4.5 9.4a1 1 0 0 0-.9-.6H3a1.2 1.2 0 0 1 0-2.4h.06a1 1 0 0 0 .93-.65 1 1 0 0 0-.2-1.1l-.07-.07a1.2 1.2 0 1 1 1.7-1.7l.07.07A1 1 0 0 0 6.6 3a1 1 0 0 0 .6-.9V2a1.2 1.2 0 0 1 2.4 0v.06a1 1 0 0 0 .6.92 1 1 0 0 0 1.1-.2l.07-.07a1.2 1.2 0 1 1 1.7 1.7l-.07.07A1 1 0 0 0 12.8 5.6a1 1 0 0 0 .9.6H13a1.2 1.2 0 0 1 0 2.4h-.06a1 1 0 0 0-.92.6l-.02.2Z" stroke="currentColor" stroke-width="1.4"/>
        </svg>
      </button>
    </div>
<!-- Status -->
    <div id="statusMsg" class="status-msg"></div>

    <!-- Settings panel (collapsed by default) -->
    <div class="settings-panel" id="settingsPanel" hidden>
      <div class="field">
        <label for="geminiApiKey">API Key</label>
        <div class="input-wrap">
          <input type="password" id="geminiApiKey" placeholder="aistudio.google.com/apikey" autocomplete="off" />
          <button type="button" class="reveal-btn" id="revealKeyBtn" title="Show/hide key">
            <svg id="eyeIcon" width="13" height="13" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M1 10s3.6-7 9-7 9 7 9 7-3.6 7-9 7-9-7-9-7Z" stroke="currentColor" stroke-width="1.5"/>
              <circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="field">
        <label for="geminiModel">Model</label>
        <input type="text" id="geminiModel" value="gemini-2.0-flash-lite" />
      </div>
      <div class="field">
        <label for="serverUrl">Server URL</label>
        <input type="text" id="serverUrl" value="http://localhost:3000" />
      </div>
<div class="field" style="display: flex; flex-direction: row; gap: 6px; margin-top: 6px;">
  <button type="button" id="startServerBtn" class="btn-save" style="flex:1;">Start</button>
  <button type="button" id="stopServerBtn" class="btn-save" style="flex:1;">Stop</button>
  <button type="button" id="saveSettingsBtn" class="btn-save" style="flex:1;">Save</button>
</div>
    </div>



    <!-- Lang row -->
    <div class="lang-row">
      <div class="field flex-1">
        <label for="ocrLang">OCR</label>
        <select id="ocrLang">
          <option value="auto">Auto</option>
          <option value="vie">Vietnamese</option>
          <option value="eng" selected>English</option>
          <option value="chs">Chinese (S)</option>
          <option value="cht">Chinese (T)</option>
          <option value="jpn">Japanese</option>
          <option value="kor">Korean</option>
          <option value="fre">French</option>
          <option value="ger">German</option>
          <option value="spa">Spanish</option>
          <option value="por">Portuguese</option>
          <option value="ita">Italian</option>
          <option value="rus">Russian</option>
          <option value="ara">Arabic</option>
          <option value="tha">Thai</option>
        </select>
      </div>
      <div class="lang-arrow">→</div>
      <div class="field flex-1">
        <label for="targetLang">Translate</label>
        <select id="targetLang">
          <option value="Vietnamese" selected>Vietnamese</option>
          <option value="English">English</option>
          <option value="Chinese (Simplified)">Chinese (S)</option>
          <option value="Japanese">Japanese</option>
          <option value="Korean">Korean</option>
          <option value="French">French</option>
          <option value="German">German</option>
          <option value="Spanish">Spanish</option>
          <option value="Thai">Thai</option>
        </select>
      </div>
    </div>

    <!-- Action buttons -->
    <div class="action-row">
      <button type="button" id="captureBtn" class="btn-primary">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="1" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.4"/>
          <path d="M5 5h2M5 8h6M5 11h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        Capture Selection
      </button>
      <button type="button" id="runBtn" class="btn-run" disabled>Run</button>
    </div>

    <!-- Preview -->
    <div class="preview-wrap" id="previewWrap" hidden>
      <img id="previewThumb" alt="Preview" />
      <button type="button" id="clearBtn" class="clear-btn" title="Clear">✕</button>
    </div>

    <!-- OCR output -->
    <div class="field">
      <div class="field-header">
        <label>OCR <span id="detectedLang" class="lang-badge"></span></label>
        <button type="button" class="icon-btn" id="copyOcrBtn">Copy</button>
      </div>
      <textarea id="ocrResult" rows="4" placeholder="OCR text will appear here…"></textarea>
    </div>

    <!-- Translation output -->
    <div class="field">
      <div class="field-header">
        <label>Translation</label>
        <button type="button" class="icon-btn" id="copyTranslationBtn">Copy</button>
      </div>
      <textarea id="translatedResult" rows="4" placeholder="Translation will appear here…"></textarea>
    </div>

   

  </div>
<script src="CSInterface.js"></script>
  <script src="./renderer.js"></script>
</body>
</html>
